# Local development docker-compose
# Works with Docker Compose and Podman Compose
# Usage: ./dev.sh start  (or: docker compose up -d)

services:
  postgres:
    image: cgr.dev/chainguard/postgres:latest
    container_name: dabb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dabb
      POSTGRES_PASSWORD: dabb_dev_password
      POSTGRES_DB: dabb
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Note: Schema is now managed by postgres-migrations on server startup
      # init.sql only runs on first volume init — creates the 'umami' analytics database
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'dabb', '-d', 'dabb']
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: dabb-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://dabb:dabb_dev_password@postgres:5432/dabb
      CLIENT_URL: http://localhost:8080
      UMAMI_URL: http://umami:3000
      # UMAMI_WEBSITE_ID: set this after creating a website in the Umami dashboard
    ports:
      - '3000:3000'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          'require("http").get("http://localhost:3000/health",r=>process.exit(r.statusCode===200?0:1)).on("error",()=>process.exit(1))',
        ]
      interval: 30s
      timeout: 3s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_SERVER_URL: http://localhost:3000
        # VITE_UMAMI_URL: http://localhost:3001/umami
        # VITE_UMAMI_WEBSITE_ID: set after creating website in Umami dashboard
    container_name: dabb-web
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - '8080:8080'
    healthcheck:
      test: ['CMD', 'nginx', '-t']
      interval: 30s
      timeout: 3s
      retries: 3

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: dabb-umami
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://dabb:dabb_dev_password@postgres:5432/umami
      APP_SECRET: dabb_umami_dev_secret
      BASE_PATH: /umami
    ports:
      - '3001:3000'

volumes:
  postgres_data:
