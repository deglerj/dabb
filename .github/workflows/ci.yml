name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      client: ${{ steps.filter.outputs.client }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
      - name: Check for client-related changes
        id: filter
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qE '^(apps/client|packages)/|^(pnpm-lock\.yaml|package\.json|turbo\.json|pnpm-workspace\.yaml|firebase\.json|database\.rules\.json)$|^\.github/workflows/ci\.yml$'; then
            echo "client=true" >> $GITHUB_OUTPUT
          else
            echo "client=false" >> $GITHUB_OUTPUT
          fi

  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: '10.33.0'

      - name: Cache pnpm dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ~/.local/share/pnpm/store/v3
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache Turbo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install ${{ github.actor != 'dependabot[bot]' && '--frozen-lockfile' || '' }}

      - name: Build packages
        run: pnpm run build

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: '10.33.0'

      - name: Cache pnpm dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ~/.local/share/pnpm/store/v3
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache Turbo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install ${{ github.actor != 'dependabot[bot]' && '--frozen-lockfile' || '' }}

      - name: Build packages
        run: pnpm run build

      - name: Run tests
        run: pnpm run test

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    continue-on-error: true
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --lockfile=pnpm-lock.yaml
            --config=osv-scanner.toml
            --format=sarif
            --output=osv-results.sarif

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        if: always()
        with:
          sarif_file: osv-results.sarif

  bundle-web:
    name: Bundle Web Client
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, changes]
    if: needs.changes.outputs.client == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: '10.33.0'

      - name: Cache pnpm dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ~/.local/share/pnpm/store/v3
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Bundle web (catches Metro resolution errors)
        run: pnpm --filter @dabb/client bundle:web

  build-client-apk:
    name: Build Client APK
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test, changes]
    if: needs.changes.outputs.client == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build Android builder image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: apps/client/Dockerfile.android
          push: false
          load: true
          tags: dabb-android-builder:ci
          cache-from: type=gha,scope=android-builder
          cache-to: type=gha,mode=max,scope=android-builder

      - name: Cache Gradle dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: /tmp/gradle-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/client/package.json') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache ccache (native C++ build cache)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: /tmp/ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('apps/client/package.json') }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Build APK in Docker
        run: |
          mkdir -p /tmp/gradle-cache /tmp/ccache
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -v /tmp/gradle-cache:/gradle-cache \
            -v /tmp/ccache:/ccache-cache \
            -e GRADLE_USER_HOME=/gradle-cache \
            -e CCACHE_DIR=/ccache-cache \
            -e CCACHE_MAXSIZE=2G \
            dabb-android-builder:ci

      - name: Upload APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: client-apk
          path: apps/client/build/dabb.apk
          retention-days: 7

  build-client-apk-smoketest:
    name: Build Client APK (smoke test)
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test, changes]
    if: needs.changes.outputs.client == 'true'
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build Android builder image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: apps/client/Dockerfile.android
          push: false
          load: true
          tags: dabb-android-builder:ci-smoketest
          cache-from: type=gha,scope=android-builder
          cache-to: type=gha,mode=max,scope=android-builder

      - name: Cache Gradle dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: /tmp/gradle-cache-smoketest
          key: ${{ runner.os }}-gradle-smoketest-${{ hashFiles('apps/client/package.json') }}
          restore-keys: |
            ${{ runner.os }}-gradle-smoketest-

      - name: Cache ccache (native C++ build cache)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: /tmp/ccache-smoketest
          key: ${{ runner.os }}-ccache-smoketest-${{ hashFiles('apps/client/package.json') }}
          restore-keys: |
            ${{ runner.os }}-ccache-smoketest-

      - name: Build smoke-test APK in Docker
        run: |
          mkdir -p /tmp/gradle-cache-smoketest /tmp/ccache-smoketest
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -v /tmp/gradle-cache-smoketest:/gradle-cache \
            -v /tmp/ccache-smoketest:/ccache-cache \
            -e GRADLE_USER_HOME=/gradle-cache \
            -e CCACHE_DIR=/ccache-cache \
            -e CCACHE_MAXSIZE=2G \
            -e EXPO_PUBLIC_USE_FIREBASE_EMULATOR=true \
            -e EXPO_PUBLIC_FIREBASE_DATABASE_URL=https://demo-dabb-default-rtdb.firebaseio.com \
            -e EXPO_PUBLIC_FIREBASE_PROJECT_ID=demo-dabb \
            dabb-android-builder:ci-smoketest \
            apps/client/scripts/build-apk.sh standalone x86_64

      - name: Upload smoke-test APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: client-apk-smoketest
          path: apps/client/build/dabb.apk
          retention-days: 7

  smoke-test-android:
    name: Android Startup Smoke Test
    runs-on: ubuntu-latest
    needs: [build-client-apk-smoketest, changes]
    if: needs.changes.outputs.client == 'true'
    timeout-minutes: 20
    continue-on-error: true # TODO: remove once the flow is stable across a few PRs

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: '10.33.0'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Java 21 (required by firebase-tools emulator)
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download smoke-test APK
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: client-apk-smoketest
          path: apps/client/build

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Start Firebase RTDB emulator
        run: |
          # nohup + fully detached fds (not a bare `&`) so this process
          # survives into the later android-emulator-runner step — GitHub
          # Actions runs each step as its own shell, and a plain background
          # job doesn't reliably outlive the step that started it (confirmed:
          # a bare `&` here left the emulator dead by the time the Maestro
          # step tried to connect, despite readiness passing in this step).
          nohup pnpm exec firebase emulators:start --only database --project demo-dabb \
            > /tmp/firebase-emulator.log 2>&1 < /dev/null &
          disown
          for i in $(seq 1 60); do
            if nc -z localhost 9000; then
              echo "Firebase RTDB emulator ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Firebase RTDB emulator did not become ready within 60s"
          cat /tmp/firebase-emulator.log
          exit 1

      - name: Run Android emulator and Maestro flow
        uses: ReactiveCircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          script: |
            # Suppress the one-time "Viewing full screen" immersive-mode toast
            # that Android shows on first launch of an edge-to-edge app — it
            # overlays the screen and can swallow Maestro's taps/text input.
            adb shell settings put secure immersive_mode_confirmations confirmed
            adb logcat -c
            adb logcat > /tmp/logcat.txt &
            # TEMP DIAGNOSTIC — confirms the emulator guest can still reach
            # the Firebase emulator port at the TCP level after the nohup fix.
            echo "--- connectivity probe from emulator guest ---"
            adb shell timeout 3 sh -c "echo > /dev/tcp/10.0.2.2/9000 && echo TCP_9000_OK || echo TCP_9000_FAIL"
            echo "--- end connectivity probe ---"
            adb install apps/client/build/dabb.apk
            maestro test apps/client/e2e/startup-create-join.yaml

      - name: Upload Maestro debug output on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: maestro-debug-output
          path: |
            ~/.maestro/tests
            /tmp/logcat.txt
          retention-days: 7
