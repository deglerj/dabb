name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/dabb

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      client: ${{ steps.filter.outputs.client }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Check for client-related changes
        id: filter
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qE '^(apps/client|packages)/|^(pnpm-lock\.yaml|package\.json|turbo\.json|pnpm-workspace\.yaml)$'; then
            echo "client=true" >> $GITHUB_OUTPUT
          else
            echo "client=false" >> $GITHUB_OUTPUT
          fi

  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Cache pnpm dependencies
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store/v3
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install ${{ github.actor != 'dependabot[bot]' && '--frozen-lockfile' || '' }}

      - name: Build packages
        run: pnpm run build

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Cache pnpm dependencies
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store/v3
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install ${{ github.actor != 'dependabot[bot]' && '--frozen-lockfile' || '' }}

      - name: Build packages
        run: pnpm run build

      - name: Run tests
        run: pnpm run test

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    continue-on-error: true
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.3
        with:
          scan-args: |-
            --lockfile=pnpm-lock.yaml
            --config=osv-scanner.toml
            --format=sarif
            --output=osv-results.sarif

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: osv-results.sarif

  bundle-web:
    name: Bundle Web Client
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, changes]
    if: needs.changes.outputs.client == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Cache pnpm dependencies
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store/v3
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Bundle web (catches Metro resolution errors)
        run: pnpm --filter @dabb/client bundle:web

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    needs: [lint-and-typecheck, test]
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      security-events: write

    strategy:
      matrix:
        include:
          - app: server
            dockerfile: apps/server/Dockerfile
            build_args: ''
            platforms: linux/amd64,linux/arm64
          - app: client
            dockerfile: apps/client/Dockerfile.web
            build_args: |
              SERVER_URL=https://dabb.degler.info
              EXPO_PUBLIC_UMAMI_URL=${{ vars.VITE_UMAMI_URL }}
              EXPO_PUBLIC_UMAMI_WEBSITE_ID=${{ vars.VITE_UMAMI_WEBSITE_ID }}
            platforms: linux/amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.app }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.app }}:scan
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0 - only uncompromised tag after March 2026 supply chain attack
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.app }}:scan
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Trivy (table output for logs)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0 - only uncompromised tag after March 2026 supply chain attack
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.app }}:scan
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true

      - name: Push Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ matrix.platforms }}

  build-client-apk:
    name: Build Client APK
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test, changes]
    if: needs.changes.outputs.client == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Android builder image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/client/Dockerfile.android
          push: false
          load: true
          tags: dabb-android-builder:ci
          cache-from: type=gha,scope=android-builder
          cache-to: type=gha,mode=max,scope=android-builder

      - name: Cache Gradle dependencies
        uses: actions/cache@v5
        with:
          path: /tmp/gradle-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/client/package.json') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build APK in Docker
        run: |
          mkdir -p /tmp/gradle-cache
          docker run --rm \
            -v "${{ github.workspace }}:/app" \
            -v /tmp/gradle-cache:/gradle-cache \
            -e GRADLE_USER_HOME=/gradle-cache \
            dabb-android-builder:ci

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: client-apk
          path: apps/client/build/dabb.apk
          retention-days: 7
