version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    cooldown:
      default-days: 5
    ignore:
      # expo SDK 55 requires react-native 0.83.x; 0.84.0 broke the Kotlin
      # Promise interface in a way expo-modules-core 55.x doesn't handle.
      # Remove this ignore once expo SDK 56 (which supports RN 0.84+) is released.
      - dependency-name: 'react-native'
        versions: ['0.84.x']
      # async-storage v3 is incompatible with Expo Go SDK 55: "Native module is
      # null, cannot access legacy storage". Remove once upgrading to Expo SDK 56+.
      - dependency-name: '@react-native-async-storage/async-storage'
        versions: ['>=3']
    groups:
      dev-dependencies:
        patterns:
          - '@types/*'
          - 'typescript'
          - 'vitest'
          - 'turbo'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react*'
      expo:
        patterns:
          - 'expo*'
          - 'react-native*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    cooldown:
      default-days: 5

  - package-ecosystem: 'docker'
    directory: '/apps/server'
    schedule:
      interval: 'weekly'
    cooldown:
      default-days: 5

  - package-ecosystem: 'docker'
    directory: '/apps/client'
    schedule:
      interval: 'weekly'
    cooldown:
      default-days: 5
    ignore:
      # JDK 25 is non-LTS and breaks the Android build: CMake configuration fails
      # for react-native-worklets, react-native-screens, and react-native-skia due
      # to restricted method access tightened in JDK 25. Stick with JDK 21 (LTS).
      - dependency-name: 'eclipse-temurin'
        versions: ['>=22']
