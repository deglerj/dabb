<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Bollen = Schellen (Quartered ball) — heraldic quartering in four colors -->

  <defs>
    <clipPath id="bollen-clip">
      <circle cx="50" cy="50" r="40"/>
    </clipPath>
  </defs>

  <!-- Top-left quadrant: dark crimson -->
  <rect x="10" y="10" width="40" height="40" fill="#9B1515" clip-path="url(#bollen-clip)"/>
  <!-- Top-right quadrant: golden yellow -->
  <rect x="50" y="10" width="40" height="40" fill="#C89000" clip-path="url(#bollen-clip)"/>
  <!-- Bottom-left quadrant: forest green -->
  <rect x="10" y="50" width="40" height="40" fill="#1A5A1A" clip-path="url(#bollen-clip)"/>
  <!-- Bottom-right quadrant: dark navy -->
  <rect x="50" y="50" width="40" height="40" fill="#1A1A7A" clip-path="url(#bollen-clip)"/>

  <!-- Gold dividing cross -->
  <line x1="50" y1="10" x2="50" y2="90" stroke="#D4A520" stroke-width="2.5"/>
  <line x1="10" y1="50" x2="90" y2="50" stroke="#D4A520" stroke-width="2.5"/>

  <!-- Gold border ring -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#D4A520" stroke-width="4"/>
</svg>
