<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Kreuz = Eichel (Acorn) — golden oval nut, simple arch cupule, dark stem -->

  <!-- Acorn nut body (oval: taller than wide, egg-shaped) -->
  <ellipse cx="50" cy="68" rx="22" ry="28" fill="#C4941A"/>

  <!-- Cupule: simple two-bezier arch that covers the top of the nut -->
  <path d="M28,56 Q28,32 50,30 Q72,32 72,56 Z" fill="#3C5E26"/>

  <!-- Stem (ends at cupule peak) -->
  <rect x="46" y="12" width="8" height="20" rx="4" fill="#3C5E26"/>
</svg>
