<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Schippe = Blatt (Leaf) — rounded Württemberg leaf shape, forest green -->

  <!-- Leaf body: rounded oval with pointed tip at top, short stem notch at bottom -->
  <path d="M50,8
           C68,9 88,25 91,48
           C94,70 80,86 60,89
           L53,97 L47,97 L40,89
           C20,86 6,70 9,48
           C12,25 32,9 50,8Z"
        fill="#1E7B1E"/>

  <!-- Center vein (subtle) -->
  <path d="M50,10 Q50,50 50,88" fill="none" stroke="#145A14" stroke-width="1.5" opacity="0.5"/>
</svg>
