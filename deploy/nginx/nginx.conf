server {
    listen 80;
    server_name dabb.degler.info;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    server_name analytics.dabb.degler.info;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name analytics.dabb.degler.info;

    ssl_certificate     /etc/letsencrypt/live/analytics.dabb.degler.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/analytics.dabb.degler.info/privkey.pem;

    location / {
        # Allow cross-origin requests from the main app (tracking script POSTs)
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "https://dabb.degler.info";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";
            add_header Content-Length 0;
            return 204;
        }
        add_header Access-Control-Allow-Origin "https://dabb.degler.info";

        proxy_pass http://umami:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name dabb.degler.info;

    ssl_certificate     /etc/letsencrypt/live/dabb.degler.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dabb.degler.info/privkey.pem;

    # WebSocket support for Socket.IO
    location /socket.io/ {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://server:3000;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://server:3000;
    }

    location / {
        proxy_pass http://web:8080;
        proxy_set_header Host $host;
    }
}
