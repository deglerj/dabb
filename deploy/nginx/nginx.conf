server {
    listen 80;
    server_name dabb.degler.info;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name dabb.degler.info;

    ssl_certificate     /etc/letsencrypt/live/dabb.degler.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dabb.degler.info/privkey.pem;

    # Umami analytics dashboard and tracking API
    # Next.js (inside umami) 308-redirects /umami/ → /umami, so both must be proxied.
    location = /umami {
        proxy_pass http://umami:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /umami/ {
        proxy_pass http://umami:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket support for Socket.IO
    location /socket.io/ {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://server:3000;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://server:3000;
    }

    location / {
        proxy_pass http://web:8080;
        proxy_set_header Host $host;
    }
}
