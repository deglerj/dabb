<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- App icon background: amber → dark wood -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8811a"/>
      <stop offset="55%" stop-color="#a06830"/>
      <stop offset="100%" stop-color="#5e3510"/>
    </linearGradient>

    <!-- Subtle center radial glow -->
    <radialGradient id="bgGlow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#e09020" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#e09020" stop-opacity="0"/>
    </radialGradient>

    <!-- Card face: aged parchment -->
    <linearGradient id="cardFace" x1="0%" y1="0%" x2="5%" y2="100%">
      <stop offset="0%" stop-color="#fdfbf4"/>
      <stop offset="100%" stop-color="#ecdabb"/>
    </linearGradient>

    <!-- Back card: slightly warmer paper -->
    <linearGradient id="cardBack" x1="0%" y1="0%" x2="5%" y2="100%">
      <stop offset="0%" stop-color="#f8f0df"/>
      <stop offset="100%" stop-color="#e8d2a8"/>
    </linearGradient>

    <!-- Drop shadow for cards -->
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="2" dy="10" stdDeviation="12"
                    flood-color="#1a0a00" flood-opacity="0.55"/>
    </filter>

    <!-- Lighter shadow for back card -->
    <filter id="shadowLight" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8"
                    flood-color="#1a0a00" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>
  <rect width="512" height="512" rx="90" fill="url(#bgGlow)"/>

  <!-- Subtle corner diamonds on background -->
  <text x="62"  y="80"  font-family="Georgia,serif" font-size="20" fill="#e09020" text-anchor="middle" opacity="0.45">♦</text>
  <text x="450" y="80"  font-family="Georgia,serif" font-size="20" fill="#e09020" text-anchor="middle" opacity="0.45">♦</text>
  <text x="62"  y="455" font-family="Georgia,serif" font-size="20" fill="#e09020" text-anchor="middle" opacity="0.45">♦</text>
  <text x="450" y="455" font-family="Georgia,serif" font-size="20" fill="#e09020" text-anchor="middle" opacity="0.45">♦</text>

  <!-- ── Back card (behind, rotated left) ── -->
  <g transform="translate(208,256) rotate(-20)" filter="url(#shadowLight)">
    <!-- Card body: 190×268 -->
    <rect x="-95" y="-134" width="190" height="268" rx="14" fill="url(#cardBack)"/>
    <!-- Inner border in dark red -->
    <rect x="-81" y="-120" width="162" height="240" rx="10"
          fill="none" stroke="#a83018" stroke-width="3.5" opacity="0.8"/>
    <!-- Card back decoration: suit grid -->
    <text x="0" y="-12" font-family="Georgia,'Times New Roman',serif"
          font-size="26" fill="#a83018" text-anchor="middle" dominant-baseline="middle" opacity="0.75">♥  ♦</text>
    <text x="0" y="28"  font-family="Georgia,'Times New Roman',serif"
          font-size="26" fill="#3d2010" text-anchor="middle" dominant-baseline="middle" opacity="0.75">♣  ♠</text>
  </g>

  <!-- ── Front card (main focus, slight right tilt) ── -->
  <g transform="translate(276,258) rotate(5)" filter="url(#shadow)">
    <!-- Card body: 214×298 -->
    <rect x="-107" y="-149" width="214" height="298" rx="14" fill="url(#cardFace)"/>
    <!-- Inner border: thin, warm gold -->
    <rect x="-95" y="-137" width="190" height="274" rx="10"
          fill="none" stroke="#c8a870" stroke-width="1.5"/>

    <!-- ── Top-left corner ── -->
    <!-- Rank letter "D" -->
    <text x="-84" y="-95"
          font-family="Georgia,'Times New Roman',serif"
          font-size="50" font-weight="bold"
          fill="#1a1208"
          dominant-baseline="alphabetic">D</text>
    <!-- Suit: ♦ Bollen (diamond) in red -->
    <text x="-72" y="-64"
          font-family="Georgia,serif" font-size="24"
          fill="#c0392b"
          text-anchor="middle" dominant-baseline="alphabetic">♦</text>

    <!-- ── Centre: large "D" ── -->
    <text x="2" y="28"
          font-family="Georgia,'Times New Roman',serif"
          font-size="128" font-weight="bold"
          fill="#1a1208"
          text-anchor="middle" dominant-baseline="middle"
          opacity="0.90">D</text>

    <!-- ── Four suits flanking the centre D ── -->
    <!-- ♣ Kreuz — top -->
    <text x="2" y="-68"
          font-family="Georgia,serif" font-size="30"
          fill="#1a1208" text-anchor="middle" dominant-baseline="middle" opacity="0.72">♣</text>
    <!-- ♠ Schippe — bottom -->
    <text x="2" y="120"
          font-family="Georgia,serif" font-size="30"
          fill="#1a1208" text-anchor="middle" dominant-baseline="middle" opacity="0.72">♠</text>
    <!-- ♥ Herz — left -->
    <text x="-65" y="28"
          font-family="Georgia,serif" font-size="30"
          fill="#c0392b" text-anchor="middle" dominant-baseline="middle" opacity="0.72">♥</text>
    <!-- ♦ Bollen — right -->
    <text x="67" y="28"
          font-family="Georgia,serif" font-size="30"
          fill="#c0392b" text-anchor="middle" dominant-baseline="middle" opacity="0.72">♦</text>

    <!-- ── Bottom-right corner (inverted mirror of top-left) ── -->
    <g transform="rotate(180)">
      <text x="-84" y="-95"
            font-family="Georgia,'Times New Roman',serif"
            font-size="50" font-weight="bold"
            fill="#1a1208"
            dominant-baseline="alphabetic">D</text>
      <text x="-72" y="-64"
            font-family="Georgia,serif" font-size="24"
            fill="#c0392b"
            text-anchor="middle" dominant-baseline="alphabetic">♦</text>
    </g>
  </g>
</svg>
