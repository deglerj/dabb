packages:
  - 'apps/*'
  - 'packages/*'

# Refuse to resolve dependency versions published less than a day ago —
# gives the community time to catch and pull malicious releases first.
minimumReleaseAge: 1440

onlyBuiltDependencies:
  - '@shopify/react-native-skia'
  - esbuild

overrides:
  '@expo/dom-webview': '~56.0.5'
  react: 19.2.7
  react-dom: 19.2.7
  socket.io-parser: ^4.2.6
  undici: ^7.24.5
  flatted: ^3.4.2
  'minimatch@3>brace-expansion': ^1.1.13
  picomatch: ^4.0.4
  qs: ^6.14.2
  yaml: ^2.8.3
